<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>eledji</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="app">
    <!-- La maquette du téléphone est maintenant l'élément principal -->
    <div id="main-content">
      <div class="device-mockup">
        <div class="phone">
          <!-- L'écran de bienvenue est maintenant DANS le téléphone -->
          <div id="splash" class="splash">
            <div class="splash-content">
              <h1>Bienvenue sur KARTY</h1>
              <button id="start-btn" class="start-btn">Commencer</button>
            </div>
          </div>

          <!-- Le formulaire est aussi DANS le téléphone -->
          <div class="registration-container hidden">
            <form id="registration-form">
              <h2>Créer un compte</h2>
              <div class="profile-pic-selector">
                <label for="profile-pic-input">
                  <img id="profile-pic-preview" src="https://ssl.gstatic.com/images/branding/product/1x/avatar_circle_blue_120dp.png" alt="Aperçu de la photo de profil">
                  <span>Choisir une photo</span>
                </label>
                <input type="file" id="profile-pic-input" name="profile-pic" accept="image/*" class="hidden">
              </div>
              <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" placeholder="Votre pseudo" required>
              </div>
              <button type="submit" class="btn-primary">Continuer</button>
              <div class="separator">
                <span>OU</span>
              </div>
              <button type="button" id="google-signin-btn" class="btn-secondary">
                Continuer avec Google</button>
            </form>
          </div>

          <header class="phone-header">
            <button class="back-btn">←</button>
            <div class="title">Eledji com.</div>
          </header>

          <section class="phone-screen">
            <div id="home-view" class="view active">
              <div class="media hidden">
                <img src="IMG-20250215-WA0090.jpg" alt="Contenu" />
                <div class="right-actions">
                  <button class="action">♡</button>
                  <button class="action">💬</button>
                  <button class="action">⤴</button>
                </div>
              </div>
            </div>

            <div id="discover-view" class="view hidden"><h2>Découvrir</h2><p>Contenu de la page Découvrir.</p></div>
            <div id="messages-view" class="view hidden"><h2>Messages</h2><p>Contenu de la page des messages.</p></div>
            <div id="account-view" class="view hidden">
              <!-- Le profil de l'utilisateur sera injecté ici par JS -->
            </div>
          </section>

        </div>
      </div>
    </div>

  </main>

  <!-- SDK Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

  <script src="app.js"></script>
</body>
</html>
